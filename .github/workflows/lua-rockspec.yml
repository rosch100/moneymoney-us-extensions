name: Lua rockspec build

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  rockspec:
    name: Build via LuaRocks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "5.4"
          buildCache: "false"

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Build rockspec
        run: |
          set -euo pipefail
          ls -la
          luarocks make "${GITHUB_WORKSPACE}/moneymoney-dev-1.rockspec"

