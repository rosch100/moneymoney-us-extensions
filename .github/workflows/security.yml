name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        # gitleaks-action v2 konfiguriert über Env-Variablen; kein `with: args` nutzen.
        # Standardverhalten ist bereits „redact“-freundlich; bei Bedarf kann man über
        # GITLEAKS_CONFIG / GITLEAKS_VERSION weiter feinjustieren.

  python-sast:
    name: Python SAST (bandit)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install bandit

      - name: Run bandit (tracked Python files)
        shell: bash
        run: |
          set -euo pipefail
          files="$(git ls-files '*.py' || true)"
          if [ -z "${files}" ]; then
            echo "No Python files tracked."
            exit 0
          fi
          bandit -q -r scripts tests

